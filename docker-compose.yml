services:
  hush-app:
    build: .
    restart: unless-stopped
    environment:
      PORT: "4173"
      TURN_URLS: "turn:${TURN_DOMAIN}:3478?transport=udp,turn:${TURN_DOMAIN}:3478?transport=tcp"
      TURN_AUTH_SECRET: "${TURN_AUTH_SECRET}"
      TURN_TTL_SECONDS: "${TURN_TTL_SECONDS:-86400}"
    expose:
      - "4173"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - hush-app
    environment:
      APP_DOMAIN: "${APP_DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    command:
      - --log-file=stdout
      - --fingerprint
      - --lt-cred-mech
      - --use-auth-secret
      - --static-auth-secret=${TURN_AUTH_SECRET}
      - --realm=${TURN_DOMAIN}
      - --server-name=${TURN_DOMAIN}
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --external-ip=${PUBLIC_IP}
      - --no-cli
      - --no-multicast-peers
      - --no-loopback-peers
      - --stale-nonce=600
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  caddy_data:
  caddy_config:
